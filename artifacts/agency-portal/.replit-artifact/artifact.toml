kind = "web"
previewPath = "/"
title = "Portale Agenzia"
version = "1.0.0"
id = "artifacts/agency-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21881

[services.development]
run = "pnpm --filter @workspace/agency-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agency-portal", "run", "build" ]
publicDir = "artifacts/agency-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21881"
BASE_PATH = "/"
